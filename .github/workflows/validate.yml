name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shell:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -I{} bash -n {}

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare .env
        run: cp .env.example .env
      - name: Validate compose
        run: docker compose config >/tmp/compose.out
